services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mock-server:
    build: ./mock-server
    ports:
      - "5000:5000"

  pipeline-service:
    build: ./pipeline-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
      MOCK_SERVER_URL: http://mock-server:5000
    depends_on:
      - postgres
      - mock-server

volumes:
  pgdata:
